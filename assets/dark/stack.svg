<svg viewBox="0 0 1000 238" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Stack — languages, mobile, web, data, ai, terminal, tooling">
  <style>
    :root { --bone: #444444; --rule: #C0C0C0; --muted: #888888; --accent: #555555; }
    @media (prefers-color-scheme: dark) { :root { --bone: #DDDDDD; --rule: #444444; --muted: #777777; --accent: #AAAAAA; } }
    .mono { font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    .rise { opacity: 0; animation: rise .6s cubic-bezier(.2,.7,.2,1) forwards; }
    @keyframes rise { from { opacity:0;transform:translateY(6px); } to { opacity:1;transform:translateY(0); } }
    .a1{animation-delay:.1s} .a2{animation-delay:.2s} .a3{animation-delay:.3s} .a4{animation-delay:.4s} .a5{animation-delay:.5s} .a6{animation-delay:.6s} .a7{animation-delay:.7s}
    @media (prefers-reduced-motion: reduce) { .rise { animation: none; opacity: 1; } }
      :root { --bone: #000000; --muted: #000000; --dim: #000000; --rule: #000000; --accent: #000000; --node-bg: #FFFFFF; --core-bg: #FFFFFF; }
  :root { --bone:#FFFFFF; --muted:#FFFFFF; --dim:#FFFFFF; --rule:#FFFFFF; --accent:#FFFFFF; --node-bg:#000000; --core-bg:#000000; --ghost:#FFFFFF; --ink:#FFFFFF; --paper:#000000; --ghost:#FFFFFF; }
</style>

  <line x1="138" y1="8" x2="138" y2="230" stroke="var(--rule)" stroke-width="1" opacity=".4"/>

  <text class="mono rise a1" x="48" y="32"  font-size="12" fill="var(--muted)" letter-spacing="2">LANGUAGES</text>
  <text class="mono rise a1" x="154" y="32"  font-size="15" fill="var(--bone)">Python · JavaScript · TypeScript · C/C++ · SQL · Solidity</text>

  <text class="mono rise a2" x="48" y="64"  font-size="12" fill="var(--muted)" letter-spacing="2">FRONTEND</text>
  <text class="mono rise a2" x="154" y="64"  font-size="15" fill="var(--bone)">React.js · Next.js · Tailwind CSS · HTML5 · CSS3</text>

  <text class="mono rise a3" x="48" y="96"  font-size="12" fill="var(--muted)" letter-spacing="2">BACKEND</text>
  <text class="mono rise a3" x="154" y="96"  font-size="15" fill="var(--bone)">Node.js · Express · FastAPI · REST APIs · AWS Lambda</text>

  <text class="mono rise a4" x="48" y="128" font-size="12" fill="var(--muted)" letter-spacing="2">DATA/CLOUD</text>
  <text class="mono rise a4" x="154" y="128" font-size="15" fill="var(--bone)">MongoDB · Firebase · Redis · AWS · Docker</text>

  <text class="mono rise a5" x="48" y="160" font-size="12" fill="var(--muted)" letter-spacing="2">AI &amp; ML</text>
  <text class="mono rise a5" x="154" y="160" font-size="15" fill="var(--bone)">TensorFlow · NLP · Neural Networks · RLHF · Prompt Engineering</text>

  <text class="mono rise a6" x="48" y="192" font-size="12" fill="var(--muted)" letter-spacing="2">EMBED/SEC</text>
  <text class="mono rise a6" x="154" y="192" font-size="15" fill="var(--bone)">ESP32/FreeRTOS · Zero Trust EDR · Kyber/BB84 Cryptography</text>

  <text class="mono rise a7" x="48" y="224" font-size="12" fill="var(--muted)" letter-spacing="2">BLOCKCHAIN</text>
  <text class="mono rise a7" x="154" y="224" font-size="15" fill="var(--bone)">Solidity · Polygon · Hardhat · Chainlink · ethers.js</text> 
</svg>





















